# Aktiviert via SPRING_PROFILES_ACTIVE=docker (siehe docker-compose.yml)
# Ueberschreibt nur, was sich vom Standardprofil (H2) unterscheidet.

spring.datasource.url=jdbc:postgresql://postgres:5432/securemailbox
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=false

# --- Mail (JavaMail): MailHog-Container statt localhost ---
# "mailhog" ist der Service-Name aus docker-compose.yml - Docker's
# interne DNS-Aufloesung macht daraus die richtige Container-IP.
spring.mail.host=mailhog
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Der Master-Key kommt hier bewusst NICHT als Default rein, sondern nur
# ueber die Umgebungsvariable APP_ENCRYPTION_MASTER_KEY_BASE64, die
# docker-compose setzt. Spring Boot mappt Umgebungsvariablen automatisch
# auf die entsprechende Property (relaxed binding).

# --- Authentication ---
# Genau wie der Encryption-Key: kommt ueber APP_JWT_SECRET_BASE64 aus der
# Umgebung (siehe docker-compose.yml), niemals als Default im Repository.
app.cookies.secure=true

# Hinter einem echten Reverse-Proxy/Ingress mit TLS-Termination waere
# die Origin hier die tatsaechliche Domain statt localhost - anpassen,
# sobald ein Hostname feststeht.
app.cors.allowed-origins=http://localhost:4200
