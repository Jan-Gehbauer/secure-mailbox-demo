spring.application.name=secure-mailbox

# --- H2 (lokale Entwicklung, In-Memory) ---
# Ab Tag 3 wechseln wir hier auf Postgres via Docker
spring.datasource.url=jdbc:h2:mem:securemailbox;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Verschlüsselung ---
# NUR FÜR LOKALE ENTWICKLUNG. Generiert mit EncryptionService.generateNewMasterKeyBase64().
# In einer echten Umgebung: niemals im Repository, sondern via Umgebungsvariable /
# Secrets-Manager / Vault injizieren.
app.encryption.master-key-base64=FOvY10+tE0m6j5SeCwqcYK9NJxU9psYVCDLlsWtf1y8=

server.port=8080

# --- Mail (JavaMail) ---
# Fuer lokale Entwicklung ohne Docker: setzt voraus, dass lokal ein
# Test-SMTP-Server auf Port 1025 laeuft (z.B. `docker run -p 1025:1025
# -p 8025:8025 mailhog/mailhog`). Falls nicht erreichbar: kein Problem,
# der Fehler wird geloggt, aber die App funktioniert trotzdem weiter
# (siehe NotificationMailService).
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
app.mail.from=no-reply@securemailbox.local
