server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Alle Routen auf index.html umleiten, damit clientseitiges Routing
    # funktioniert (aktuell zwar nur eine Route, aber Standard-Praxis für SPAs)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
