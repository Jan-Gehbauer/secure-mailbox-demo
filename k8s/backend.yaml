apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2   # zwei Instanzen, um zu zeigen, dass die App horizontal skaliert
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          # Lokal gebautes Image, siehe README-k8s.md fuer den Build/Load-Schritt
          image: secure-mailbox-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            # Wiederverwendung des bereits vorhandenen "docker"-Profils:
            # Service-Namen ("postgres", "mailhog") sind in Docker Compose
            # und Kubernetes identisch aufloesbar (beide nutzen interne DNS).
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: securemailbox-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: securemailbox-secrets
                  key: POSTGRES_PASSWORD
            - name: APP_ENCRYPTION_MASTER_KEY_BASE64
              valueFrom:
                secretKeyRef:
                  name: securemailbox-secrets
                  key: APP_ENCRYPTION_MASTER_KEY_BASE64
            - name: APP_JWT_SECRET_BASE64
              valueFrom:
                secretKeyRef:
                  name: securemailbox-secrets
                  key: APP_JWT_SECRET_BASE64
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
